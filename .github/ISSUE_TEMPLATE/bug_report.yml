name: 🐛 Bug Report
description: Report a bug to help us improve
title: "bug: [Short Description]"
labels: ["bug"]
body:
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: What happened and what did you expect to happen?
      placeholder: Describe the bug here...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we recreate this issue?
      placeholder: 1. Open the app...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: Browser, OS, Device, etc.
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot / Video
      description: Highly recommended for UI bugs.
